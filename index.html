<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KALI. — Instagram Icerik Analiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#000;--white:#fff;--red:#D42B2B;
  --surface-0:#0a0a0a;--surface-1:#111;--surface-2:#1a1a1a;--surface-3:#222;
  --gray-400:#999;--gray-500:#777;--gray-600:#555;--gray-700:#333;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;
  --ease:cubic-bezier(.4,0,.2,1)
}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--white);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* ============ PIN SCREEN ============ */
#pin-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--black);position:fixed;top:0;left:0;width:100%;z-index:1000}
.pin-container{text-align:center;max-width:360px;padding:40px}
.pin-logo{margin-bottom:8px}
.pin-logo img{width:500px;max-width:80vw;filter:invert(1)}
.pin-subtitle{font-size:13px;color:var(--gray-400);letter-spacing:2px;text-transform:uppercase;margin-bottom:48px}
.pin-input-wrap{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.pin-digit{width:48px;height:56px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-sm);color:var(--white);font-size:24px;text-align:center;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s var(--ease)}
.pin-digit:focus{border-color:var(--red)}
.pin-digit.filled{border-color:rgba(255,255,255,0.3)}
.pin-error{color:var(--red);font-size:13px;min-height:20px;margin-bottom:16px}
.pin-btn{width:100%;padding:14px;background:var(--red);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;letter-spacing:1px;transition:opacity .2s var(--ease)}
.pin-btn:hover{opacity:.9}
.pin-btn:active{opacity:.8}
.pin-btn:disabled{opacity:.4;cursor:not-allowed}

/* ============ HEADER ============ */
.header{background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo img{height:80px;filter:invert(1)}
.header-right{display:flex;align-items:center;gap:12px}
.daily-counter{font-size:11px;color:var(--gray-400);background:rgba(255,255,255,0.06);padding:5px 12px;border-radius:20px}
.daily-counter b{color:var(--white)}
.logout-btn{background:none;border:1px solid rgba(255,255,255,0.12);color:var(--gray-400);padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;transition:all .2s var(--ease)}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* ============ SCREENS ============ */
#app{display:none}
.screen{display:none}
.screen.active{display:block}

/* ============ SCREEN 1: DASHBOARD ============ */
.form-section{max-width:560px;margin:48px auto 40px;padding:0 20px;text-align:center}
.form-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:6px;letter-spacing:-0.02em}
.form-desc{color:var(--gray-500);font-size:13px;margin-bottom:28px;line-height:1.6}
.input-group{display:flex;gap:10px;margin-bottom:12px}
.input-field{flex:1;padding:13px 16px;background:var(--surface-1);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);color:var(--white);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s var(--ease)}
.input-field:focus{border-color:var(--red)}
.input-field::placeholder{color:var(--gray-600)}
.submit-btn{padding:13px 28px;background:var(--red);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.3px;transition:all .2s var(--ease);white-space:nowrap}
.submit-btn:hover{opacity:.9;transform:translateY(-1px)}
.submit-btn:active{transform:translateY(0)}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.form-status{margin-top:12px;font-size:12px;color:var(--gray-400);min-height:18px}
.form-status.error{color:var(--red)}
.form-status.success{color:#4ade80}
.loading-bar{width:100%;height:3px;background:rgba(255,255,255,0.04);position:relative;overflow:hidden;border-radius:2px;margin-top:16px;display:none}
.loading-bar.active{display:block}
.loading-bar::after{content:'';position:absolute;top:0;left:-40%;width:40%;height:100%;background:linear-gradient(90deg,transparent,var(--red),transparent);animation:loading 1.5s infinite}
@keyframes loading{0%{left:-40%}100%{left:100%}}

/* DINO GAME */
.dino-wrapper{max-width:620px;margin:0 auto;padding:0 20px;text-align:center}
.dino-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 4px}
.dino-timer{font-size:12px;color:var(--gray-400);font-style:italic}
.dino-score{font-size:12px;color:var(--gray-400)}
.dino-score b{color:var(--red);font-size:14px}
#dino-canvas{display:block;margin:0 auto;border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-md);background:var(--surface-1);max-width:100%;cursor:pointer}
.dino-hint{font-size:11px;color:var(--gray-600);margin-top:10px;letter-spacing:.3px}
.dino-hint kbd{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:4px;padding:2px 6px;font-family:'Inter',sans-serif;font-size:10px;color:var(--gray-400)}

/* HISTORY SECTION */
.history-section{max-width:720px;margin:0 auto;padding:0 20px 60px}
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.history-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
.history-count{font-size:12px;color:var(--gray-500)}

/* ANALYSIS PROFILE CARD */
.analysis-card{background:var(--surface-1);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius-md);padding:20px;margin-bottom:12px;cursor:pointer;transition:all .25s var(--ease);display:flex;align-items:center;justify-content:space-between;gap:16px}
.analysis-card:hover{border-color:rgba(212,43,43,0.3);background:var(--surface-2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.analysis-card:active{transform:translateY(0)}
.ac-left{display:flex;align-items:center;gap:16px;min-width:0}
.ac-avatar{width:48px;height:48px;border-radius:50%;background:var(--surface-3);border:2px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--red);flex-shrink:0;font-family:'Playfair Display',serif}
.ac-info{min-width:0}
.ac-username{font-size:15px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-meta{font-size:12px;color:var(--gray-500);display:flex;gap:12px;flex-wrap:wrap}
.ac-meta span{display:flex;align-items:center;gap:4px}
.ac-arrow{color:var(--gray-600);font-size:18px;flex-shrink:0;transition:transform .2s var(--ease)}
.analysis-card:hover .ac-arrow{transform:translateX(4px);color:var(--red)}

.empty-state{text-align:center;padding:60px 20px;color:var(--gray-600)}
.empty-state p{font-size:14px;margin-top:8px}

/* ============ SCREEN 2: ACCOUNT ANALYSIS ============ */
.account-header{max-width:1080px;margin:0 auto;padding:24px 20px 0}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--surface-1);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);color:var(--gray-400);font-size:13px;cursor:pointer;transition:all .2s var(--ease);margin-bottom:20px}
.back-btn:hover{border-color:var(--red);color:var(--white)}
.account-info{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.account-avatar{width:56px;height:56px;border-radius:50%;background:var(--surface-2);border:2px solid var(--red);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--red);font-family:'Playfair Display',serif}
.account-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:700}
.account-date{font-size:12px;color:var(--gray-500);margin-top:2px}

/* FILTERS */
.filters-row{max-width:1080px;margin:0 auto;padding:0 20px;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-pill{padding:6px 14px;background:var(--surface-1);border:1px solid rgba(255,255,255,0.08);border-radius:20px;color:var(--gray-400);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s var(--ease)}
.filter-pill:hover,.filter-pill.active{background:var(--red);border-color:var(--red);color:var(--white)}

/* VIDEO CARD GRID */
.video-grid{max-width:1080px;margin:0 auto;padding:0 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

.video-card{background:var(--surface-1);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius-lg);overflow:hidden;transition:all .25s var(--ease);cursor:pointer}
.video-card:hover{border-color:rgba(212,43,43,0.25);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.4)}
.video-card:active{transform:translateY(-1px)}

.vc-thumb{position:relative;aspect-ratio:4/5;background:var(--surface-3);overflow:hidden}
.vc-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s var(--ease)}
.video-card:hover .vc-thumb img{transform:scale(1.05)}
.vc-thumb-placeholder{display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:var(--gray-600);font-size:12px}
.vc-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;background:rgba(212,43,43,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s var(--ease)}
.video-card:hover .vc-play{opacity:1}
.vc-play svg{width:20px;height:20px;fill:white;margin-left:3px}
.vc-priority{position:absolute;top:10px;right:10px;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.vc-priority.high{background:rgba(212,43,43,0.9);color:white}
.vc-priority.medium{background:rgba(255,200,50,0.9);color:#000}
.vc-priority.low{background:rgba(74,222,128,0.9);color:#000}

.vc-body{padding:14px 16px 16px}
.vc-channel{font-size:11px;color:var(--red);font-weight:600;letter-spacing:.5px;margin-bottom:4px}
.vc-title{font-size:13px;font-weight:500;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;min-height:39px}
.vc-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.vc-stat{font-size:11px;color:var(--gray-500)}
.vc-stat b{color:var(--white);font-weight:600}
.vc-tags{display:flex;gap:5px;flex-wrap:wrap}
.vc-tag{padding:3px 8px;border-radius:10px;font-size:10px;font-weight:500}
.vc-tag.category{background:rgba(255,255,255,0.06);color:var(--gray-400)}
.vc-tag.hook{background:rgba(212,43,43,0.1);color:var(--red)}
.vc-detail-btn{display:block;width:100%;padding:10px;background:none;border:none;border-top:1px solid rgba(255,255,255,0.06);color:var(--gray-500);font-size:12px;font-weight:500;cursor:pointer;transition:color .2s var(--ease)}
.vc-detail-btn:hover{color:var(--white)}

/* ============ SCREEN 3: VIDEO DETAIL MODAL ============ */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:none;justify-content:center;align-items:flex-start;overflow-y:auto;padding:40px 20px}
.modal-overlay.active{display:flex}
body.modal-open{overflow:hidden}

.modal{background:var(--surface-0);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-lg);max-width:720px;width:100%;margin:0 auto;overflow:hidden;animation:modalIn .3s var(--ease)}
@keyframes modalIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.modal-top{position:relative}
.modal-close{position:absolute;top:12px;left:12px;z-index:5;width:36px;height:36px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:none;border-radius:50%;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s var(--ease)}
.modal-close:hover{background:var(--red)}
.modal-ig-link{position:absolute;bottom:12px;right:12px;z-index:5;padding:8px 16px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:20px;color:white;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;transition:background .2s var(--ease)}
.modal-ig-link:hover{background:var(--red)}
.modal-thumb{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:var(--surface-3)}
.modal-thumb-placeholder{width:100%;aspect-ratio:4/5;background:var(--surface-3);display:flex;align-items:center;justify-content:center;color:var(--gray-600)}

.modal-header{padding:20px 24px 16px}
.modal-channel{font-size:12px;color:var(--red);font-weight:600;letter-spacing:.5px;margin-bottom:6px}
.modal-title{font-size:18px;font-weight:600;line-height:1.5;margin-bottom:12px}
.modal-stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.modal-stat{font-size:13px;color:var(--gray-500)}
.modal-stat b{color:var(--white)}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap}
.m-badge{padding:4px 12px;border-radius:12px;font-size:11px;font-weight:600;letter-spacing:.3px}
.m-badge.high{background:rgba(212,43,43,0.15);color:var(--red)}
.m-badge.medium{background:rgba(255,200,50,0.15);color:#ffc832}
.m-badge.low{background:rgba(74,222,128,0.12);color:#4ade80}
.m-badge.cat{background:rgba(255,255,255,0.06);color:var(--gray-400)}
.m-badge.hook{background:rgba(212,43,43,0.1);color:var(--red)}

/* MODAL SECTIONS */
.modal-sections{padding:0 24px 24px}
.m-divider{display:flex;align-items:center;gap:12px;margin:24px 0 16px}
.m-divider-line{flex:1;height:1px;background:rgba(255,255,255,0.08)}
.m-divider-text{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red)}
.m-section{background:var(--surface-1);border:1px solid rgba(255,255,255,0.04);border-radius:var(--radius-md);padding:16px 18px;margin-bottom:12px}
.m-section-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray-500);margin-bottom:10px}
.m-section-text{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.8;white-space:pre-wrap}
.m-section.script{background:rgba(212,43,43,0.04);border-color:rgba(212,43,43,0.12);border-left:3px solid var(--red)}
.m-section.script .m-section-title{color:var(--red)}
.m-section.script .m-section-text{color:var(--white);font-size:14px}
.m-section.transcript{cursor:pointer}
.m-section.transcript .m-section-text{display:none;font-style:italic;opacity:.6;font-size:12px}
.m-section.transcript.open .m-section-text{display:block}
.m-section.transcript .m-section-title::after{content:' ▼';font-size:8px}
.m-section.transcript.open .m-section-title::after{content:' ▲'}

/* ============ RESPONSIVE ============ */
@media(max-width:480px){
  /* PIN SCREEN — tam ortala, yukari cek */
  #pin-screen{align-items:center;justify-content:center}
  .pin-container{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;margin-top:-15vh}
  .pin-logo{margin-bottom:16px}
  .pin-logo img{width:260px;max-width:70vw}
  .pin-subtitle{margin-bottom:32px;font-size:11px}
  .pin-digit{width:42px;height:50px;font-size:20px}
  /* HEADER */
  .header{padding:12px 16px}
  .header-logo img{height:52px}
  /* FORM */
  .form-section{margin:32px auto 28px}
  .form-title{font-size:22px}
  .form-desc{font-size:12px;margin-bottom:20px}
  .input-group{flex-direction:column}
  .submit-btn{width:100%}
  /* HISTORY */
  .analysis-card{padding:16px}
  .ac-avatar{width:40px;height:40px;font-size:16px}
  .ac-username{font-size:14px}
  .ac-meta{font-size:11px}
  /* VIDEO GRID */
  .video-grid{grid-template-columns:1fr;gap:12px}
  /* MODAL */
  .modal-overlay{padding:0}
  .modal{border-radius:0;min-height:100vh}
  .modal-header{padding:16px}
  .modal-sections{padding:0 16px 16px}
  .modal-title{font-size:16px}
  /* ACCOUNT */
  .account-header{padding:16px 16px 0}
  .account-name{font-size:20px}
  .filters-row{padding:0 16px}
  .video-grid{padding:0 16px 40px}
  /* DINO */
  #dino-canvas{max-height:160px}
}
@media(min-width:481px) and (max-width:768px){
  .video-grid{grid-template-columns:repeat(2,1fr)}
  .input-group{flex-direction:column}
  .submit-btn{width:100%}
}
@media(min-width:769px){
  .header{padding:16px 32px}
  .form-section{margin:56px auto 44px}
  .form-title{font-size:32px}
  .history-section{max-width:760px}
  .video-grid{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
  .modal-overlay{padding:60px 20px}
}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-container">
    <div class="pin-logo"><img src="kali_logo.png" alt="Kali."></div>
    <div class="pin-subtitle">Sosyal Medya Analiz</div>
    <div class="pin-input-wrap">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" autofocus>
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric">
    </div>
    <div class="pin-error" id="pin-error"></div>
    <button class="pin-btn" id="pin-btn" onclick="checkPin()">Giris Yap</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header class="header">
    <div class="header-logo"><img src="kali_logo.png" alt="Kali."></div>
    <div class="header-right">
      <div class="daily-counter">Bugun: <b id="daily-count">0</b>/3</div>
      <button class="logout-btn" onclick="logout()">Cikis</button>
    </div>
  </header>

  <!-- SCREEN 1: Dashboard -->
  <div class="screen active" id="screen-dashboard">
    <div class="form-section">
      <div class="form-title">Instagram Icerik Analiz</div>
      <div class="form-desc">Rakip hesabin linkini yapistirin. Viral videolar analiz edilecek ve Kerem icin icerik onerileri uretilecek.</div>
      <div class="input-group">
        <input class="input-field" id="ig-input" type="text" placeholder="instagram.com/ryanserhant veya @ryanserhant">
        <button class="submit-btn" id="submit-btn" onclick="startAnalysis()">Analiz Et</button>
      </div>
      <div class="form-status" id="form-status"></div>
      <div class="loading-bar" id="loading-bar"></div>
    </div>

    <!-- DINO GAME (analiz beklerken) -->
    <div id="dino-section" style="display:none">
      <div class="dino-wrapper">
        <div class="dino-header">
          <span class="dino-timer" id="dino-timer">Analiz yaklasik 10 dakika surebilir</span>
          <span class="dino-score">Skor: <b id="dino-score-display">0</b></span>
        </div>
        <canvas id="dino-canvas" width="600" height="200"></canvas>
        <div class="dino-hint">Ziplamak icin <kbd>SPACE</kbd> veya ekrana <kbd>DOKUN</kbd></div>
      </div>
    </div>

    <div class="history-section" id="history-section" style="display:none">
      <div class="history-header">
        <div class="history-title">Gecmis Analizler</div>
        <div class="history-count" id="history-count"></div>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- SCREEN 2: Account Analysis (Video Grid) -->
  <div class="screen" id="screen-account">
    <div class="account-header">
      <button class="back-btn" onclick="showDashboard()">&#8592; Geri</button>
      <div class="account-info">
        <div class="account-avatar" id="acc-avatar"></div>
        <div>
          <div class="account-name" id="acc-name"></div>
          <div class="account-date" id="acc-date"></div>
        </div>
      </div>
    </div>
    <div class="filters-row" id="acc-filters"></div>
    <div class="video-grid" id="video-grid"></div>
  </div>
</div>

<!-- VIDEO DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">

<script>
// ============ CONFIG ============
const PIN_HASH = '592f541a1e5f4fccd1460ba5eec2bdb42ca41f90207d4a84fb80eca9aaf92b39';
const WEBHOOK_URL = 'https://n8n.srv1193133.hstgr.cloud/webhook/kali-analiz-api';
const WEBHOOK_SECRET = 'kali_sec_2026_xR9m';
const SHEET_ID = '1LxfaMycxFxfC0OZNiEIXUmjVo4zbtDgRAPNPqxf1sZg';
const SHEET_TAB = 'Analiz';
const MAX_DAILY = 3;
const LOCKOUT_MS = 5 * 60 * 1000;
const PLACEHOLDER_THUMB = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" fill="%23222"><rect width="400" height="500"/><text x="50%" y="50%" fill="%23555" font-family="sans-serif" font-size="14" text-anchor="middle" dy=".3em">Gorsel Yok</text></svg>');

let attempts = 0;
let lockoutUntil = 0;
let allGroups = [];
let activeGroupIdx = -1;

// ============ SHA-256 ============
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ============ PIN ============
const pinDigits = document.querySelectorAll('.pin-digit');
pinDigits.forEach((el, i) => {
  el.addEventListener('input', () => {
    el.classList.toggle('filled', el.value.length > 0);
    if (el.value && i < 5) pinDigits[i + 1].focus();
    if (i === 5 && el.value) checkPin();
  });
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !el.value && i > 0) pinDigits[i - 1].focus();
  });
});

async function checkPin() {
  const now = Date.now();
  if (now < lockoutUntil) {
    document.getElementById('pin-error').textContent = `Cok fazla deneme. ${Math.ceil((lockoutUntil - now) / 1000)}sn bekleyin.`;
    return;
  }
  const pin = Array.from(pinDigits).map(el => el.value).join('');
  if (pin.length < 6) return;
  const hash = await sha256(pin);
  if (hash === PIN_HASH) {
    attempts = 0;
    sessionStorage.setItem('kali_auth', '1');
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    updateDailyCounter();
    loadResults();
  } else {
    attempts++;
    pinDigits.forEach(el => { el.value = ''; el.classList.remove('filled'); });
    pinDigits[0].focus();
    if (attempts >= 3) {
      lockoutUntil = now + LOCKOUT_MS;
      document.getElementById('pin-error').textContent = '3 yanlis deneme. 5 dakika beklemelisiniz.';
      document.getElementById('pin-btn').disabled = true;
      setTimeout(() => { document.getElementById('pin-btn').disabled = false; document.getElementById('pin-error').textContent = ''; attempts = 0; }, LOCKOUT_MS);
    } else {
      document.getElementById('pin-error').textContent = `Yanlis PIN. ${3 - attempts} deneme hakkiniz kaldi.`;
    }
  }
}

// ============ SESSION ============
if (sessionStorage.getItem('kali_auth') === '1') {
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  updateDailyCounter();
  loadResults();
}
function logout() { sessionStorage.removeItem('kali_auth'); location.reload(); }

// ============ DAILY LIMIT ============
function getDailyKey() { const d = new Date(); return `kali_daily_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`; }
function getDailyCount() { return parseInt(localStorage.getItem(getDailyKey()) || '0'); }
function incrementDaily() { localStorage.setItem(getDailyKey(), getDailyCount() + 1); updateDailyCounter(); }
function updateDailyCounter() { document.getElementById('daily-count').textContent = getDailyCount(); }

// ============ UTILS ============
function parseUsername(input) {
  let u = input.trim();
  if (u.includes('instagram.com')) u = u.split('instagram.com/').pop();
  return u.replace(/^@/, '').replace(/\/.*$/, '').replace(/\?.*$/, '').trim();
}
function formatNum(n) {
  const num = parseInt(n) || 0;
  if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
  if (num >= 1000) return Math.round(num / 1000) + 'K';
  return num.toString();
}
function getInitial(name) { return (name || '?')[0].toUpperCase(); }

// ============ NAVIGATION ============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function showDashboard() {
  activeGroupIdx = -1;
  showScreen('screen-dashboard');
  history.pushState({ screen: 'dashboard' }, '');
}
function showAccount(groupIdx) {
  activeGroupIdx = groupIdx;
  const group = allGroups[groupIdx];
  if (!group) return;
  const rawUser = group.separator ? (group.separator['Kanal'] || '') : 'Bilinmeyen';
  const username = rawUser.replace(/^@/, '');
  const dateText = group.separator ? (group.separator['Baslik'] || '') : '';

  document.getElementById('acc-avatar').textContent = getInitial(username);
  document.getElementById('acc-name').textContent = '@' + username;
  document.getElementById('acc-date').textContent = dateText;

  renderVideoGrid(group.items);
  showScreen('screen-account');
  history.pushState({ screen: 'account', idx: groupIdx }, '');
}

window.addEventListener('popstate', (e) => {
  const overlay = document.getElementById('modal-overlay');
  if (overlay.classList.contains('active')) {
    closeModal(true);
    return;
  }
  if (activeGroupIdx >= 0) {
    showDashboard();
  }
});

// ============ FETCH SHEET DATA ============
// Sabit sutun sirasi — header row bozulsa bile calismaya devam eder
const COL_KEYS = ['No','Thumbnail','Video URL','Baslik','Kanal','Views','Likes','Comments','Engagement Rate','Format','Konu Kategorisi','Hook Skoru','Hook ve Icerik Analizi','Tam Transkript','Video Yapisi','Neden Viral','Kali Adaptasyonu','Kerem Icin Script','Oncelik','Produksiyon Notlari'];
const NUMERIC_COLS = new Set(['Views','Likes','Comments','Hook Skoru']);

async function fetchSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_TAB)}`;
  const resp = await fetch(url);
  const text = await resp.text();
  const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?/);
  if (!jsonStr) return [];
  const json = JSON.parse(jsonStr[1]);
  const rows = [];
  for (const row of json.table.rows) {
    const obj = {};
    row.c.forEach((cell, i) => {
      const key = COL_KEYS[i] || `col_${i}`;
      if (!cell) { obj[key] = ''; return; }
      if (NUMERIC_COLS.has(key)) {
        obj[key] = cell.v || '';
      } else {
        obj[key] = cell.f || String(cell.v || '');
      }
    });
    rows.push(obj);
  }
  return rows;
}

// ============ START ANALYSIS ============
async function startAnalysis() {
  const input = document.getElementById('ig-input').value;
  const username = parseUsername(input);
  const status = document.getElementById('form-status');
  const btn = document.getElementById('submit-btn');
  const loadingBar = document.getElementById('loading-bar');
  if (!username) { status.textContent = 'Gecerli bir Instagram hesap linki girin.'; status.className = 'form-status error'; return; }
  // Limit goruntusu kalsin ama engellemesin
  // if (getDailyCount() >= MAX_DAILY) { status.textContent = 'Gunluk limit doldu (3/3). Yarin tekrar deneyin.'; status.className = 'form-status error'; return; }
  btn.disabled = true;
  btn.textContent = 'Baslatiliyor...';
  status.textContent = `@${username} analiz ediliyor. Bu islem yaklasik 10 dakika surebilir.`;
  status.className = 'form-status';
  loadingBar.classList.add('active');
  DinoGame.start();
  try {
    // Mevcut satir sayisini kaydet (yeni veri tespiti icin)
    let rowCountBefore = 0;
    try { const d = await fetchSheetData(); rowCountBefore = d.length; } catch(e) {}
    const resp = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, secret: WEBHOOK_SECRET }) });
    if (!resp.ok) throw new Error('Webhook hatasi');
    incrementDaily();
    status.textContent = `@${username} analizi baslatildi! Sonuclar asagida gorunecek.`;
    status.className = 'form-status success';
    pollForResults(username, rowCountBefore);
  } catch (e) {
    console.error('startAnalysis error:', e);
    status.textContent = 'Hata: ' + (e.message || 'Bilinmeyen hata. Konsolu kontrol edin.');
    status.className = 'form-status error';
    btn.disabled = false;
    btn.textContent = 'Analiz Et';
    loadingBar.classList.remove('active');
    DinoGame.stop();
  }
}

function pollForResults(username, rowCountBefore) {
  let polls = 0;
  const loadingBar = document.getElementById('loading-bar');
  const status = document.getElementById('form-status');
  const btn = document.getElementById('submit-btn');
  const POLL_INTERVAL = 10000; // 10sn
  const MAX_POLLS = 60; // 10dk max
  const interval = setInterval(async () => {
    polls++;
    if (polls > MAX_POLLS) {
      clearInterval(interval);
      loadingBar.classList.remove('active');
      DinoGame.stop();
      status.textContent = 'Zaman asimi. n8n workflow durumunu kontrol edin.';
      status.className = 'form-status error';
      btn.disabled = false; btn.textContent = 'Analiz Et';
      return;
    }
    const elapsed = Math.floor(polls * POLL_INTERVAL / 1000);
    const min = Math.floor(elapsed / 60);
    const sec = elapsed % 60;
    status.textContent = `@${username} analiz ediliyor... ${min > 0 ? min + 'dk ' : ''}${sec}sn`;
    try {
      const data = await fetchSheetData();
      if (data.length > rowCountBefore) {
        const newRows = data.slice(rowCountBefore);
        const hasNew = newRows.some(row => {
          const kanal = String(row['Kanal'] || '').toLowerCase().replace(/^@/,'');
          return kanal.includes(username.toLowerCase());
        });
        if (hasNew) {
          clearInterval(interval);
          loadingBar.classList.remove('active');
          DinoGame.stop();
          status.textContent = `@${username} analizi tamamlandi! Asagida goruntuleyebilirsiniz.`;
          status.className = 'form-status success';
          btn.disabled = false; btn.textContent = 'Analiz Et';
          lastRowCount = data.length;
          processData(data);
        }
      }
    } catch (e) {}
  }, POLL_INTERVAL);
}

// ============ LOAD / PROCESS DATA ============
let lastRowCount = 0;
let autoRefreshInterval = null;

async function loadResults() {
  try {
    const data = await fetchSheetData();
    lastRowCount = data.length;
    if (data.length > 0) processData(data);
    // Arka planda 30sn'de bir yeni veri kontrol et
    startAutoRefresh();
  } catch (e) { console.error('loadResults:', e); }
}

function startAutoRefresh() {
  if (autoRefreshInterval) return;
  autoRefreshInterval = setInterval(async () => {
    try {
      const data = await fetchSheetData();
      if (data.length !== lastRowCount) {
        lastRowCount = data.length;
        const prevGroupCount = allGroups.length;
        processData(data);
        // Yeni analiz geldiyse bildirim goster
        if (allGroups.length > prevGroupCount && activeGroupIdx < 0) {
          const newest = allGroups[0];
          const uname = newest.separator ? (newest.separator['Kanal'] || '').replace(/^@/,'') : '';
          const status = document.getElementById('form-status');
          if (status && uname) {
            status.textContent = `@${uname} analizi tamamlandi! Asagida goruntuleyebilirsiniz.`;
            status.className = 'form-status success';
          }
        }
      }
    } catch (e) {}
  }, 30000);
}

function processData(data) {
  allGroups = [];
  let currentGroup = null;
  for (const row of data) {
    const noVal = String(row['No'] || '').trim();
    const kanal = String(row['Kanal'] || '').trim();
    // Separator row: No is empty (or '>>') but Kanal has username
    const isSeparator = (!noVal || noVal === '>>') && kanal;
    // Data row: No is a number
    const isDataRow = noVal && !isNaN(parseFloat(noVal));

    if (isSeparator) {
      currentGroup = { separator: row, items: [] };
      allGroups.push(currentGroup);
    } else if (isDataRow) {
      if (!currentGroup) {
        // Old data without separator — create synthetic group from first row's Kanal
        const synthSep = { 'Kanal': kanal || 'Bilinmeyen', 'Baslik': '' };
        currentGroup = { separator: synthSep, items: [] };
        allGroups.push(currentGroup);
      }
      currentGroup.items.push(row);
    }
  }
  allGroups.reverse();
  renderHistory();
}

// ============ RENDER HISTORY (Screen 1) ============
function renderHistory() {
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  const countEl = document.getElementById('history-count');
  if (allGroups.length === 0) {
    section.style.display = 'block';
    list.innerHTML = '<div class="empty-state"><div style="font-size:32px;margin-bottom:8px">&#128270;</div><p>Henuz analiz yapilmadi. Yukaridaki formdan baslayin.</p></div>';
    countEl.textContent = '';
    return;
  }
  section.style.display = 'block';
  countEl.textContent = allGroups.length + ' analiz';
  list.innerHTML = '';
  allGroups.forEach((group, idx) => {
    const rawUsername = group.separator ? (group.separator['Kanal'] || 'Bilinmeyen') : 'Bilinmeyen';
    const username = rawUsername.replace(/^@/, '');
    const dateText = group.separator ? (group.separator['Baslik'] || '') : '';
    const videoCount = group.items.length;
    const highCount = group.items.filter(i => (i['Oncelik'] || '').toUpperCase() === 'HIGH').length;

    const card = document.createElement('div');
    card.className = 'analysis-card';
    card.onclick = () => showAccount(idx);
    card.innerHTML = `
      <div class="ac-left">
        <div class="ac-avatar">${getInitial(username)}</div>
        <div class="ac-info">
          <div class="ac-username">@${username}</div>
          <div class="ac-meta">
            <span>${dateText}</span>
            <span>${videoCount} video</span>
            ${highCount > 0 ? `<span style="color:var(--red)">${highCount} yuksek oncelik</span>` : ''}
          </div>
        </div>
      </div>
      <div class="ac-arrow">&#8594;</div>
    `;
    list.appendChild(card);
  });
}

// ============ RENDER VIDEO GRID (Screen 2) ============
function renderVideoGrid(items) {
  const grid = document.getElementById('video-grid');
  const filtersEl = document.getElementById('acc-filters');
  const categories = new Set();
  items.forEach(item => { if (item['Konu Kategorisi']) categories.add(item['Konu Kategorisi']); });

  filtersEl.innerHTML = '<button class="filter-pill active" onclick="filterVideos(\'all\',this)">Tumu</button>';
  categories.forEach(cat => {
    filtersEl.innerHTML += `<button class="filter-pill" onclick="filterVideos('${cat}',this)">${cat}</button>`;
  });

  grid.innerHTML = '';
  items.forEach((item, idx) => {
    const thumbnail = item['Thumbnail'] || '';
    const priority = (item['Oncelik'] || '').toUpperCase();
    const prioClass = priority === 'HIGH' ? 'high' : priority === 'MEDIUM' ? 'medium' : 'low';
    const hookScore = item['Hook Skoru'] || '';
    const videoUrl = item['Video URL'] || '#';

    const card = document.createElement('div');
    card.className = 'video-card';
    card.setAttribute('data-category', item['Konu Kategorisi'] || '');

    card.innerHTML = `
      <div class="vc-thumb" onclick="event.stopPropagation();window.open('${videoUrl}','_blank')">
        ${thumbnail
          ? `<img src="${thumbnail}" alt="" loading="lazy" onerror="this.onerror=null;this.src='${PLACEHOLDER_THUMB}'">`
          : `<div class="vc-thumb-placeholder">Gorsel Yok</div>`
        }
        <div class="vc-play"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
        ${priority ? `<div class="vc-priority ${prioClass}">${priority}</div>` : ''}
      </div>
      <div class="vc-body" onclick="openModal(${idx})">
        <div class="vc-channel">@${item['Kanal'] || ''}</div>
        <div class="vc-title">${item['Baslik'] || 'Baslik yok'}</div>
        <div class="vc-stats">
          <div class="vc-stat"><b>${formatNum(item['Views'])}</b> izlenme</div>
          <div class="vc-stat"><b>${formatNum(item['Likes'])}</b> begeni</div>
          <div class="vc-stat"><b>${item['Engagement Rate'] || ''}</b></div>
        </div>
        <div class="vc-tags">
          <span class="vc-tag category">${item['Konu Kategorisi'] || ''}</span>
          ${hookScore ? `<span class="vc-tag hook">Hook ${hookScore}/10</span>` : ''}
        </div>
      </div>
      <button class="vc-detail-btn" onclick="openModal(${idx})">Detaylari Gor &#8594;</button>
    `;
    grid.appendChild(card);
  });
}

function filterVideos(category, btn) {
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.video-card').forEach(card => {
    card.style.display = (category === 'all' || card.getAttribute('data-category') === category) ? '' : 'none';
  });
}

// ============ MODAL (Screen 3) ============
function openModal(itemIdx) {
  if (activeGroupIdx < 0 || !allGroups[activeGroupIdx]) return;
  const item = allGroups[activeGroupIdx].items[itemIdx];
  if (!item) return;

  const thumbnail = item['Thumbnail'] || '';
  const priority = (item['Oncelik'] || '').toUpperCase();
  const prioClass = priority === 'HIGH' ? 'high' : priority === 'MEDIUM' ? 'medium' : 'low';
  const hookScore = item['Hook Skoru'] || '';
  const videoUrl = item['Video URL'] || '#';

  // Thumbnail
  const thumbContainer = document.getElementById('modal-thumb-container');
  if (thumbnail) {
    thumbContainer.innerHTML = `<img class="modal-thumb" src="${thumbnail}" alt="" onerror="this.onerror=null;this.outerHTML='<div class=\\'modal-thumb-placeholder\\'>Gorsel yuklenemedi</div>'">`;
  } else {
    thumbContainer.innerHTML = '<div class="modal-thumb-placeholder">Gorsel Yok</div>';
  }

  // Link
  document.getElementById('modal-ig-link').href = videoUrl;

  // Header
  document.getElementById('modal-channel').textContent = '@' + (item['Kanal'] || '');
  document.getElementById('modal-title').textContent = item['Baslik'] || 'Baslik yok';

  document.getElementById('modal-stats').innerHTML = `
    <div class="modal-stat"><b>${formatNum(item['Views'])}</b> izlenme</div>
    <div class="modal-stat"><b>${formatNum(item['Likes'])}</b> begeni</div>
    <div class="modal-stat"><b>${formatNum(item['Comments'])}</b> yorum</div>
    <div class="modal-stat"><b>${item['Engagement Rate'] || '-'}</b> etkilesim</div>
  `;

  document.getElementById('modal-badges').innerHTML = `
    ${priority ? `<span class="m-badge ${prioClass}">${priority}</span>` : ''}
    <span class="m-badge cat">${item['Konu Kategorisi'] || ''}</span>
    ${hookScore ? `<span class="m-badge hook">Hook ${hookScore}/10</span>` : ''}
    <span class="m-badge cat">${item['Format'] || 'Reel'}</span>
  `;

  // Sections
  const sections = document.getElementById('modal-sections');
  sections.innerHTML = '';

  // -- ICERIK ANALIZI --
  sections.innerHTML += divider('Icerik Analizi');
  if (item['Hook ve Icerik Analizi']) sections.innerHTML += section('Hook & Icerik Analizi', item['Hook ve Icerik Analizi']);
  if (item['Video Yapisi']) sections.innerHTML += section('Video Yapisi', item['Video Yapisi']);
  if (item['Neden Viral']) sections.innerHTML += section('Neden Viral Oldu', item['Neden Viral']);

  // -- KEREM ADAPTASYONU --
  sections.innerHTML += divider('Kerem Adaptasyonu');
  if (item['Kali Adaptasyonu']) sections.innerHTML += section('Adaptasyon Stratejisi', item['Kali Adaptasyonu']);
  if (item['Kerem Icin Script']) sections.innerHTML += `<div class="m-section script"><div class="m-section-title">Senaryo</div><div class="m-section-text">${item['Kerem Icin Script']}</div></div>`;
  if (item['Produksiyon Notlari']) sections.innerHTML += section('Produksiyon Notlari', item['Produksiyon Notlari']);

  // -- REFERANS --
  if (item['Tam Transkript']) {
    sections.innerHTML += divider('Referans');
    sections.innerHTML += `<div class="m-section transcript" onclick="this.classList.toggle('open')"><div class="m-section-title">Orijinal Transkript</div><div class="m-section-text">${item['Tam Transkript']}</div></div>`;
  }

  // Show modal
  document.getElementById('modal-overlay').classList.add('active');
  document.body.classList.add('modal-open');
  history.pushState({ screen: 'modal' }, '');
}

function closeModal(fromPopstate) {
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.classList.remove('modal-open');
  if (!fromPopstate) history.back();
}

function divider(text) {
  return `<div class="m-divider"><div class="m-divider-line"></div><div class="m-divider-text">${text}</div><div class="m-divider-line"></div></div>`;
}
function section(title, text) {
  return `<div class="m-section"><div class="m-section-title">${title}</div><div class="m-section-text">${text}</div></div>`;
}

// ESC to close
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('modal-overlay').classList.contains('active')) closeModal();
});

// ============ DINO GAME ============
const DinoGame = (() => {
  let canvas, ctx, animFrame;
  let dino, ground, cacti, clouds, score, gameOver, started;
  let gravity = 0.6, speed = 4, frameCount = 0;
  const W = 600, H = 200, GROUND_Y = 160;

  function init() {
    canvas = document.getElementById('dino-canvas');
    if (!canvas) return;
    ctx = canvas.getContext('2d');
    canvas.width = W; canvas.height = H;
    reset();
    canvas.addEventListener('click', handleInput);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(); }, {passive:false});
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && document.getElementById('dino-section').style.display !== 'none') {
        e.preventDefault(); handleInput();
      }
    });
  }

  function reset() {
    dino = { x:50, y:GROUND_Y-40, w:30, h:40, vy:0, jumping:false };
    cacti = [];
    clouds = [];
    score = 0; gameOver = false; started = false; frameCount = 0; speed = 4;
    for (let i=0;i<3;i++) clouds.push({x:Math.random()*W, y:20+Math.random()*40, w:40+Math.random()*30});
  }

  function handleInput() {
    if (gameOver) { reset(); started = true; loop(); return; }
    if (!started) { started = true; loop(); }
    if (!dino.jumping) { dino.vy = -12; dino.jumping = true; }
  }

  function spawnCactus() {
    const h = 20 + Math.random()*30;
    cacti.push({ x:W, y:GROUND_Y-h, w:12+Math.random()*8, h:h });
  }

  function update() {
    if (gameOver) return;
    frameCount++;
    score = Math.floor(frameCount/6);
    document.getElementById('dino-score-display').textContent = score;
    if (frameCount % 300 === 0) speed += 0.3;

    // Dino physics
    dino.vy += gravity;
    dino.y += dino.vy;
    if (dino.y >= GROUND_Y - dino.h) { dino.y = GROUND_Y - dino.h; dino.vy = 0; dino.jumping = false; }

    // Cacti
    if (frameCount % Math.floor(80 + Math.random()*60) === 0) spawnCactus();
    for (let c of cacti) c.x -= speed;
    cacti = cacti.filter(c => c.x + c.w > -10);

    // Clouds
    for (let cl of clouds) cl.x -= speed * 0.3;
    clouds = clouds.filter(cl => cl.x + cl.w > -10);
    if (Math.random() < 0.005) clouds.push({x:W, y:15+Math.random()*45, w:40+Math.random()*30});

    // Collision
    for (let c of cacti) {
      if (dino.x + dino.w - 6 > c.x && dino.x + 6 < c.x + c.w && dino.y + dino.h > c.y) {
        gameOver = true;
      }
    }
  }

  function draw() {
    ctx.clearRect(0,0,W,H);

    // Clouds
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    for (let cl of clouds) {
      ctx.beginPath();
      ctx.ellipse(cl.x+cl.w/2, cl.y, cl.w/2, 8, 0, 0, Math.PI*2);
      ctx.fill();
    }

    // Ground
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,GROUND_Y); ctx.lineTo(W,GROUND_Y); ctx.stroke();
    // Ground dots
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    for (let i=0;i<W;i+=20) {
      const off = (frameCount * speed) % 20;
      ctx.fillRect(i - off, GROUND_Y + 4 + Math.random()*3, 2, 1);
    }

    // Dino (Kali red dinosaur)
    ctx.fillStyle = '#D42B2B';
    // Body
    ctx.fillRect(dino.x+4, dino.y+8, 22, 24);
    // Head
    ctx.fillRect(dino.x+14, dino.y, 16, 14);
    // Eye
    ctx.fillStyle = '#fff';
    ctx.fillRect(dino.x+24, dino.y+3, 3, 3);
    // Legs
    ctx.fillStyle = '#D42B2B';
    const legOffset = started && !gameOver ? (Math.floor(frameCount/4) % 2) * 6 : 0;
    ctx.fillRect(dino.x+6, dino.y+32, 5, 8 + (legOffset ? 0 : 3));
    ctx.fillRect(dino.x+16, dino.y+32, 5, 8 + (legOffset ? 3 : 0));
    // Tail
    ctx.fillRect(dino.x, dino.y+12, 6, 5);
    // Arm
    ctx.fillRect(dino.x+18, dino.y+18, 8, 3);

    // Cacti
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (let c of cacti) {
      ctx.fillRect(c.x, c.y, c.w, c.h);
      // Cactus arms
      ctx.fillRect(c.x-3, c.y+c.h*0.3, 4, 3);
      ctx.fillRect(c.x+c.w-1, c.y+c.h*0.5, 4, 3);
    }

    // Score
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '12px Inter, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(String(score).padStart(5,'0'), W-12, 20);
    ctx.textAlign = 'left';

    if (!started) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '14px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Baslamak icin dokun veya SPACE', W/2, H/2);
      ctx.textAlign = 'left';
    }

    if (gameOver) {
      ctx.fillStyle = 'rgba(212,43,43,0.8)';
      ctx.font = 'bold 18px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W/2, H/2 - 10);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '12px Inter, sans-serif';
      ctx.fillText('Tekrar denemek icin dokun', W/2, H/2 + 14);
      ctx.textAlign = 'left';
    }
  }

  function loop() {
    if (!started && !gameOver) { draw(); return; }
    update(); draw();
    if (!gameOver) animFrame = requestAnimationFrame(loop);
  }

  function start() {
    document.getElementById('dino-section').style.display = 'block';
    if (!canvas) init();
    reset(); draw();
  }

  function stop() {
    document.getElementById('dino-section').style.display = 'none';
    if (animFrame) cancelAnimationFrame(animFrame);
    gameOver = true;
  }

  return { start, stop, init };
})();
</script>
</body>
</html>
